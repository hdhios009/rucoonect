  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

,rgba(183,149,88,0.14),transparent 70%);pointer-events:none}\n.booking-grid{display:grid;grid-template-columns:1fr;gap:54px;position:relative;z-index:1}\n@media(min-width:900px){.booking-grid{grid-template-columns:0.9fr 1.1fr;gap:10%}}\n.booking h2{color:var(--ink)}\n.booking .eyebrow{color:var(--bronze)}.booking .eyebrow::before{background:var(--bronze)}\n.booking .lead{color:var(--ink-soft)}\n.field{position:relative;margin-bottom:32px}\n.field label{font-size:11.5px;letter-spacing:0.1em;color:var(--ink-soft);text-transform:uppercase;display:block;margin-bottom:11px;font-family:'Marcellus',serif}\n.field input,.field select{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);padding:13px 0;color:var(--ink);font-size:16.5px;font-family:'Manrope';outline:none;transition:border-color .3s}\n.field select option{color:#000}\n.field input::placeholder{color:var(--ink-faint)}\n.field-line{position:absolute;left:0;bottom:0;height:1px;width:0;background:var(--sage-deep);transition:width .5s cubic-bezier(.22,1,.36,1)}\n.field input:focus~.field-line,.field select:focus~.field-line{width:100%}\n.footer{padding:68px 32px 46px;max-width:1300px;margin:0 auto;display:flex;flex-direction:column;gap:26px;border-top:1px solid var(--line)}\n@media(min-width:760px){.footer{flex-direction:row;justify-content:space-between;align-items:flex-end}}\n.footer-links{display:flex;gap:30px;font-size:13.5px;color:var(--ink-soft)}\n<\u002Fstyle><\u002Fhelmet><nav class=\"nav {{ navClass }}\" data-screen-label=\"Nav\"><span class=\"nav-name serif\">Татьяна Семёновна<\u002Fspan><div class=\"nav-links\"><a href=\"#about\">О специалисте<\u002Fa><a href=\"#services\">Направления<\u002Fa><a href=\"#process\">Формат работы<\u002Fa><a href=\"#faq\">Вопросы<\u002Fa><\u002Fdiv><a href=\"#booking\" class=\"btn nav-cta\"><span>Записаться<\u002Fspan><\u002Fa><\u002Fnav><div class=\"grain\"><\u002Fdiv><section class=\"hero\" data-screen-label=\"01 Hero\"><div class=\"light-spot\" style=\"width:440px;height:440px;background:var(--bronze-soft);opacity:.22;top:-140px;right:-100px\"><\u002Fdiv><div class=\"light-spot\" style=\"width:380px;height:380px;background:var(--sage);opacity:.28;bottom:-160px;left:-110px\"><\u002Fdiv><div class=\"hero-inner-grid\"><div class=\"hero-copy\"><span class=\"hero-tag\">ОСТЕОПАТИЧЕСКИЙ ФЕЙСФИТНЕС · ТЕЛЕСНАЯ ТЕРАПИЯ · АРОМАТЕРАПИЯ<\u002Fspan><h1 class=\"h1 reveal\" data-fade=\"\">Верните телу тишину,<br>а лицу — естественную красоту<\u002Fh1><p class=\"lead reveal\" data-fade=\"\">Индивидуальная работа с телом и лицом на стыке остеопатии, телесной терапии и эстетической косметологии. Мягко. Осознанно. Бережно к вашим границам.<\u002Fp><a href=\"#booking\" class=\"btn reveal\" data-fade=\"\"><span>Записаться на консультацию<\u002Fspan><span class=\"btn-arrow\">→<\u002Fspan><\u002Fa><div class=\"scroll-cue\"><span class=\"scroll-line\"><\u002Fspan><span>Листайте вниз<\u002Fspan><\u002Fdiv><\u002Fdiv><div class=\"hero-photo-col reveal-scale\" data-fade=\"\"><div class=\"hero-photo-frame\"><div class=\"hero-photo-inner\"><div class=\"hero-photo-breathe\"><x-import component-from-global-scope=\"image-slot\" from=\"04595118-4d65-49a6-ac53-9f37dcbc90ae#/image-slot.js\" id=\"hero-photo\" shape=\"rect\" placeholder=\"Фото специалиста, портрет во весь рост\" hint-size=\"100%,100%\" style=\"width:100%;height:100%\"><\u002Fx-import><\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"hero-float\"><div class=\"hero-float-card\"><span class=\"hero-float-text\">Индивидуальный подход<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection><section class=\"section\" id=\"about\" data-screen-label=\"02 О специалисте\"><div class=\"two-col\" style=\"position:relative\"><div class=\"light-spot\" style=\"width:340px;height:340px;background:var(--bronze-soft);opacity:.25;top:-60px;right:10%\"><\u002Fdiv><div class=\"about-photo-frame reveal-scale\" data-fade=\"\"><span class=\"about-watermark serif\">01<\u002Fspan><div class=\"about-photo\"><x-import component-from-global-scope=\"image-slot\" from=\"04595118-4d65-49a6-ac53-9f37dcbc90ae#/image-slot.js\" id=\"about-photo\" shape=\"rect\" placeholder=\"Фото в кабинете / за работой\" hint-size=\"100%,100%\" style=\"width:100%;height:100%\"><\u002Fx-import><\u002Fdiv><\u002Fdiv><div class=\"reveal\" data-fade=\"\"><span class=\"eyebrow\">О СПЕЦИАЛИСТЕ<\u002Fspan><h2 class=\"h2 mt16\">Татьяна Семёновна<\u002Fh2><p class=\"pull\">Моя практика — это не про процедуры. Это про то, чтобы вы вышли из кабинета другим человеком: спокойнее, легче, ближе к себе.<\u002Fp><p class=\"lead\">Больше десяти лет изучаю тело как систему — где физическое напряжение и эмоциональное состояние неразделимы. Работаю на стыке остеопатии, телесной терапии и эстетической косметологии, помогая клиентам вернуть лёгкость движения и естественное сияние лица.<\u002Fp><div class=\"fx gap12 mt24\" style=\"flex-wrap:wrap\"><span class=\"badge\">Остеопатия<\u002Fspan><span class=\"badge\">Телесная терапия<\u002Fspan><span class=\"badge\">Ароматерапия<\u002Fspan><span class=\"badge\">Косметология<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection><section class=\"section\" data-screen-label=\"03 Проблемы\"><div class=\"reveal\" data-fade=\"\" style=\"max-width:640px\"><span class=\"eyebrow\">С ЧЕМ ПРИХОДЯТ<\u002Fspan><h2 class=\"h2 mt16\">Знакомые ощущения?<\u002Fh2><\u002Fdiv><div class=\"problems-wrap reveal\" data-fade=\"\"><sc-for list=\"{{ problems }}\" as=\"item\" hint-placeholder-count=\"6\"><div class=\"problem-row\"><span class=\"num\">{{ item.num }}<\u002Fspan><p>{{ item.text }}<\u002Fp><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fsection><section class=\"section\" id=\"services\" data-screen-label=\"04 Направления работы\"><div class=\"services-head reveal\" data-fade=\"\"><div><span class=\"eyebrow\">НАПРАВЛЕНИЯ РАБОТЫ<\u002Fspan><h2 class=\"h2 mt16\">Каждая встреча — под ваш запрос<\u002Fh2><\u002Fdiv><\u002Fdiv><div class=\"services-grid\"><sc-for list=\"{{ services }}\" as=\"item\" hint-placeholder-count=\"6\"><div class=\"service-card reveal-scale\" data-fade=\"\"><div class=\"service-photo\" style=\"width:100%;height:100%\"><x-import component-from-global-scope=\"image-slot\" from=\"04595118-4d65-49a6-ac53-9f37dcbc90ae#/image-slot.js\" id=\"{{ item.slotId }}\" shape=\"rect\" placeholder=\"{{ item.placeholder }}\" hint-size=\"100%,100%\" style=\"width:100%;height:100%\"><\u002Fx-import><\u002Fdiv><span class=\"service-watermark serif\">{{ item.idx }}<\u002Fspan><div class=\"service-scrim\"><\u002Fdiv><div class=\"service-line\"><\u002Fdiv><div class=\"service-text\"><span class=\"idx\">{{ item.idx }}<\u002Fspan><h3 class=\"serif\">{{ item.title }}<\u002Fh3><p>{{ item.desc }}<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fsection><section class=\"section\" data-screen-label=\"05 Почему выбирают\"><div class=\"two-col rev\"><div class=\"reveal-scale\" data-fade=\"\"><div class=\"about-photo\" style=\"aspect-ratio:1/1;border-radius:2px\"><x-import component-from-global-scope=\"image-slot\" from=\"04595118-4d65-49a6-ac53-9f37dcbc90ae#/image-slot.js\" id=\"why-photo\" shape=\"rect\" placeholder=\"Крупный план — руки, работа с лицом\" hint-size=\"100%,100%\" style=\"width:100%;height:100%\"><\u002Fx-import><\u002Fdiv><\u002Fdiv><div class=\"reveal\" data-fade=\"\"><span class=\"eyebrow\">ПОЧЕМУ ИМЕННО ТАК<\u002Fspan><h2 class=\"h2 mt16\">Подход, а не набор процедур<\u002Fh2><div class=\"why-list\"><sc-for list=\"{{ reasons }}\" as=\"item\" hint-placeholder-count=\"4\"><div class=\"why-item\"><span class=\"n\">{{ item.n }}<\u002Fspan><div><h3 class=\"serif\">{{ item.title }}<\u002Fh3><p>{{ item.text }}<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection><section class=\"section\" id=\"process\" data-screen-label=\"06 Как проходит работа\"><div class=\"reveal\" data-fade=\"\" style=\"max-width:640px\"><span class=\"eyebrow\">КАК ПРОХОДИТ РАБОТА<\u002Fspan><h2 class=\"h2 mt16\">Четыре шага к результату<\u002Fh2><\u002Fdiv><div class=\"process-list\"><sc-for list=\"{{ steps }}\" as=\"item\" hint-placeholder-count=\"4\"><div class=\"process-item reveal\" data-fade=\"\"><span class=\"n\">{{ item.n }}<\u002Fspan><h3 class=\"serif\">{{ item.title }}<\u002Fh3><p>{{ item.text }}<\u002Fp><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fsection><section class=\"section\" data-screen-label=\"07 Отзывы\"><div class=\"testi-section reveal-scale\" data-fade=\"\"><span class=\"eyebrow\">ОТЗЫВЫ<\u002Fspan><h2 class=\"h2 mt16\">Слова тех, кто уже пришёл<\u002Fh2><div class=\"testi-layout\"><div class=\"testi-feat\"><span class=\"quote-mark\">\"<\u002Fspan><p>{{ testimonials.0.text }}<\u002Fp><span class=\"testi-name\">{{ testimonials.0.name }}<\u002Fspan><\u002Fdiv><sc-for list=\"{{ testimonialsRest }}\" as=\"item\" hint-placeholder-count=\"2\"><div class=\"testi-card\"><span class=\"quote-mark\">\"<\u002Fspan><p>{{ item.text }}<\u002Fp><span class=\"testi-name\">{{ item.name }}<\u002Fspan><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fdiv><\u002Fsection><section class=\"section\" id=\"faq\" data-screen-label=\"08 Вопросы\" style=\"max-width:840px\"><span class=\"eyebrow\">ЧАСТЫЕ ВОПРОСЫ<\u002Fspan><h2 class=\"h2 mt16 mb16\">Ответы на вопросы<\u002Fh2><div class=\"reveal\" data-fade=\"\"><sc-for list=\"{{ faqs }}\" as=\"item\" hint-placeholder-count=\"5\"><div class=\"faq-item\"><div class=\"faq-q\" sc-camel-on-click=\"{{ toggleFaq }}\" data-idx=\"{{ $index }}\"><h3 class=\"serif\">{{ item.q }}<\u002Fh3><span class=\"faq-plus\" style=\"{{ item.plusStyle }}\">+<\u002Fspan><\u002Fdiv><div class=\"faq-a\" style=\"{{ item.aStyle }}\"><p>{{ item.a }}<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fsection><section class=\"booking-section\" id=\"booking\" data-screen-label=\"09 Форма записи\"><div class=\"booking reveal-scale\" data-fade=\"\"><div class=\"booking-grid\"><div><span class=\"eyebrow\">ЗАПИСЬ<\u002Fspan><h2 class=\"h2 mt16\">Начните с консультации<\u002Fh2><p class=\"lead mt16\">Расскажите о своём запросе — подберу формат работы и отвечу в течение дня.<\u002Fp><\u002Fdiv><form sc-camel-on-submit=\"{{ onSubmit }}\"><div class=\"field\"><label>Имя<\u002Flabel><input type=\"text\" placeholder=\"Как к вам обращаться\" required=\"{{ true }}\"><span class=\"field-line\"><\u002Fspan><\u002Fdiv><div class=\"field\"><label>Телефон<\u002Flabel><input type=\"tel\" placeholder=\"+7 ___ ___ __ __\" required=\"{{ true }}\"><span class=\"field-line\"><\u002Fspan><\u002Fdiv><div class=\"field\"><label>Направление<\u002Flabel><sc-raw-select><option>Остеопатический фейсфитнес<\u002Foption><option>Телесная терапия<\u002Foption><option>Телесно-эмоциональное освобождение<\u002Foption><option>Ароматерапия<\u002Foption><option>Эстетическая косметология<\u002Foption><option>Ещё не решил(а)<\u002Foption><\u002Fsc-raw-select><span class=\"field-line\"><\u002Fspan><\u002Fdiv><button type=\"submit\" class=\"btn\" style=\"width:100%;justify-content:center;margin-top:16px\"><span>{{ submitLabel }}<\u002Fspan><\u002Fbutton><\u002Fform><\u002Fdiv><\u002Fdiv><\u002Fsection><footer class=\"footer\"><span class=\"serif\" style=\"font-size:18px\">Татьяна Семёновна<\u002Fspan><div class=\"footer-links\"><a href=\"tel:+70000000000\">+7 000 000-00-00<\u002Fa><a href=\"#\">Instagram<\u002Fa><a href=\"#booking\">Записаться<\u002Fa><\u002Fdiv><\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    scrolled: false,\n    faqOpen: 0,\n    submitted: false\n  };\n  componentDidMount() {\n    this._heroEl = null;\n    this._onScroll = () => {\n      const y = window.scrollY;\n      const s = y > 40;\n      if (!this._heroEl) this._heroEl = document.querySelector('.hero-photo-inner');\n      if (this._heroEl) this._heroEl.style.transform = 'translateY(' + Math.min(y * 0.08, 30) + 'px)';\n      if (s !== this.state.scrolled) this.setState({ scrolled: s });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    const reveal = (el) => {\n      const delay = Array.from(el.parentElement ? el.parentElement.children : []).indexOf(el);\n      el.style.transitionDelay = (Math.min(Math.max(delay, 0), 6) * 70) + 'ms';\n      el.classList.add('in');\n    };\n    this._revealCheck = () => {\n      document.querySelectorAll('[data-fade]:not(.in)').forEach(el => {\n        const r = el.getBoundingClientRect();\n        if (r.top < window.innerHeight * 0.92 && r.bottom > 0) reveal(el);\n      });\n    };\n    window.addEventListener('scroll', this._revealCheck, { passive: true });\n    window.addEventListener('resize', this._revealCheck);\n    this._revealPoll = setInterval(this._revealCheck, 300);\n    setTimeout(this._revealCheck, 50);\n  }\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n    window.removeEventListener('scroll', this._revealCheck);\n    window.removeEventListener('resize', this._revealCheck);\n    if (this._revealPoll) clearInterval(this._revealPoll);\n  }\n  toggleFaq = (e) => {\n    const idx = Number(e.currentTarget.getAttribute('data-idx'));\n    this.setState(s => ({ faqOpen: s.faqOpen === idx ? -1 : idx }));\n  };\n  onSubmit = (e) => {\n    e.preventDefault();\n    this.setState({ submitted: true });\n  };\n  renderVals() {\n    const problems = [\n      { num: '01', text: 'Хроническое напряжение в шее и плечах' },\n      { num: '02', text: 'Асимметрия и «уставшее» выражение лица' },\n      { num: '03', text: 'Ощущение зажатости и скованности в теле' },\n      { num: '04', text: 'Трудно расслабиться даже в состоянии покоя' },\n      { num: '05', text: 'Эмоциональное напряжение, которое «застряло» в теле' },\n      { num: '06', text: 'Желание вернуть лёгкость и естественное сияние' }\n    ];\n    const services = [\n      { idx: '01', title: 'Остеопатический фейсфитнес', desc: 'Мягкая работа с мышцами и фасциями лица без инъекций и травматизации', slotId: 'svc-1', placeholder: 'Фото: работа с лицом' },\n      { idx: '02', title: 'Телесная терапия', desc: 'Восстановление свободы движения через мягкое телесное взаимодействие', slotId: 'svc-2', placeholder: 'Фото: телесная терапия' },\n      { idx: '03', title: 'Телесно-эмоциональное освобождение', desc: 'Работа с зажимами на стыке тела и психоэмоционального состояния', slotId: 'svc-3', placeholder: 'Фото: сессия освобождения' },\n      { idx: '04', title: 'Работа с зажимами', desc: 'Точечное снятие физического и психоэмоционального напряжения', slotId: 'svc-4', placeholder: 'Фото: работа с телом' },\n      { idx: '05', title: 'Ароматерапия', desc: 'Натуральные эфирные масла терапевтического класса в каждой сессии', slotId: 'svc-5', placeholder: 'Фото: эфирные масла' },\n      { idx: '06', title: 'Эстетическая косметология', desc: 'Уход, поддерживающий естественную красоту без резких вмешательств', slotId: 'svc-6', placeholder: 'Фото: косметология' }\n    ];\n    const reasons = [\n      { n: '01', title: 'Целостный взгляд', text: 'Тело и эмоции рассматриваются как единая система, а не набор симптомов' },\n      { n: '02', title: 'Индивидуальный маршрут', text: 'Каждая программа собирается под конкретный запрос, а не по шаблону' },\n      { n: '03', title: 'Бережность', text: 'Работа всегда идёт в темпе, комфортном для вашего тела и границ' },\n      { n: '04', title: 'Натуральные средства', text: 'Только эфирные масла терапевтического класса, никакой химии' }\n    ];\n    const steps = [\n      { n: '01', title: 'Консультация', text: 'Знакомство, разговор о запросе и текущем состоянии' },\n      { n: '02', title: 'Диагностика', text: 'Определяем зоны напряжения — физического и эмоционального' },\n      { n: '03', title: 'Программа', text: 'Собираем индивидуальный маршрут сессий под вашу цель' },\n      { n: '04', title: 'Сопровождение', text: 'Отслеживаем динамику и мягко корректируем формат работы' }\n    ];\n    const testimonials = [\n      { text: 'Отзывы будут добавлены после согласования с клиентом.', name: '' },\n      { text: 'Отзывы будут добавлены после согласования с клиентом.', name: '' },\n      { text: 'Отзывы будут добавлены после согласования с клиентом.', name: '' }\n    ];\n    const faqsRaw = [\n      { q: 'Сколько длится одна сессия?', a: 'В среднем 60–90 минут в зависимости от запроса и выбранного направления работы.' },\n      { q: 'Сколько сессий нужно для результата?', a: 'Индивидуально: часть эффектов заметна уже после первой встречи, устойчивый результат — курс из 4–8 сессий.' },\n      { q: 'Это больно?', a: 'Нет. Работа строится на мягком, бережном взаимодействии с телом без резких воздействий.' },\n      { q: 'Есть ли противопоказания?', a: 'Уточняются на консультации индивидуально — учитываются состояние здоровья и текущие процессы.' },\n      { q: 'Как подготовиться к первой встрече?', a: 'Ничего специального не требуется — приходите в удобной одежде, лучше не на голодный желудок.' }\n    ];\n    const faqOpen = this.state.faqOpen;\n    const faqs = faqsRaw.map((f, i) => ({\n      ...f,\n      aStyle: i === faqOpen ? 'max-height:200px' : 'max-height:0px',\n      plusStyle: i === faqOpen ? 'transform:rotate(45deg)' : ''\n    }));\n    return {\n      navClass: this.state.scrolled ? 'scrolled' : '',\n      problems, services, reasons, steps,\n      testimonials, testimonialsRest: testimonials.slice(1),\n      faqs,\n      toggleFaq: this.toggleFaq,\n      onSubmit: this.onSubmit,\n      submitLabel: this.state.submitted ? 'Заявка отправлена ✓' : 'Отправить заявку'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
